
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Tournament Manager</title>

    <!--
      Styling inspirerad av din portfolio:
      - svart + neon-canvas-bakgrund
      - glas-paneler (samma på alla tre)
      - neonknappar
      - rainbow-text på rubriker
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon1: #00f0ff;
            --neon2: #ff00e6;
            --neon3: #ffdd00;
            --neon4: #9d4edd;
            --text: #e5e7eb;
            --muted: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #000;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas-bakgrund */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
        }

        /* Rainbow-text */
        .rainbow-text {
            background: linear-gradient(270deg, var(--neon1), var(--neon2), var(--neon3), var(--neon4));
            background-size: 800% 800%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 10s ease infinite;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        @keyframes rainbow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(13,13,13,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.8);
        }

            header span {
                font-size: 1.5rem;
                filter: drop-shadow(0 0 8px rgba(0,240,255,0.8));
                animation: trophyFloat 3s ease-in-out infinite;
            }

        @keyframes trophyFloat {
            0%,100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* Layout */
        .container {
            max-width: 1150px;
            margin: 0 auto;
            padding: 2.5rem 1.75rem 3.5rem;
            display: grid;
            grid-template-columns: minmax(0,1fr) minmax(0,1fr);
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* Paneler – gemensam glasstil */
        .panel {
            position: relative;
            background: rgba(0,0,0,0.15);
            border-radius: 18px;
            padding: 1.7rem 1.6rem 1.6rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 12px 32px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            transition: transform 0.18s ease-out, box-shadow 0.18s ease-out, border-color 0.18s ease-out;
        }

            .panel::before {
                content: none; /* ingen extra färgtint */
            }

            .panel:hover {
                transform: translateY(-3px);
                border-color: rgba(255,221,0,0.9);
                box-shadow: 0 0 14px rgba(255,221,0,0.7),
            }

            .panel h2 {
                font-size: 1rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.18em;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                gap: 0.7rem;
            }

                .panel h2::before {
                    content: "";
                    width: 26px;
                    height: 2px;
                    border-radius: 999px;
                    background: linear-gradient(90deg, var(--neon1), var(--neon3));
                    box-shadow: 0 0 10px rgba(0,240,255,0.8);
                }

        /* Labels + inputs */
        label {
            display: block;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 0.25rem;
            margin-top: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

            label:first-of-type {
                margin-top: 0;
            }

        input,
        textarea,
        select {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 0.6rem 0.85rem;
            color: var(--neon1);
            font-size: 0.9rem;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            outline: none;
            backdrop-filter: blur(6px);
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s, transform 0.1s;
        }

            /* Gör kalender-ikonen synlig och neon */
            input[type="datetime-local"]::-webkit-calendar-picker-indicator {
                filter: invert(1) drop-shadow(0 0 4px rgba(255,221,0,0.9));
                opacity: 1;
                cursor: pointer;
            }

            input::placeholder,
            textarea::placeholder {
                color: rgba(0,240,255,0.7);
            }

            select option {
                background: #000;
                color: var(--neon1);
            }

            input:focus,
            textarea:focus,
            select:focus {
                border-color: rgba(255,221,0,0.95);
                box-shadow: 0 0 0 1px rgba(255,221,0,0.8), 0 0 14px rgba(255,221,0,0.7);
                transform: translateY(-1px);
                background: rgba(0,0,0,0.35);
            }

        textarea {
            resize: none;
            min-height: 60px;
        }

        /* Knappar – neon */
        .btn {
            display: inline-block;
            padding: 0.8rem 1.6rem;
            margin: 0.5rem;
            border-radius: 30px;
            background: transparent;
            border: 2px solid var(--neon1);
            color: var(--neon1);
            font-weight: bold;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            text-shadow: 0 0 6px var(--neon1);
            transition: all 0.3s;
            cursor: pointer;
        }

            .btn:hover {
                background: var(--neon1);
                color: #111;
                box-shadow: 0 0 12px var(--neon1), 0 0 30px var(--neon1);
            }

            .btn:active {
                transform: scale(0.96);
                filter: brightness(0.97);
            }

        .btn-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        /* Feedback */
        .feedback {
            margin-top: 0.75rem;
            padding: 0.6rem 0.9rem;
            border-radius: 999px;
            font-size: 0.8rem;
            display: none;
            border: 1px solid transparent;
        }

            .feedback.show {
                display: block;
            }

            .feedback.ok {
                background: rgba(21,128,61,0.25);
                color: #bbf7d0;
                border-color: rgba(34,197,94,0.7);
                box-shadow: 0 0 12px rgba(34,197,94,0.4);
            }

            .feedback.err {
                background: rgba(127,29,29,0.3);
                color: #fecaca;
                border-color: rgba(248,113,113,0.85);
                box-shadow: 0 0 12px rgba(248,113,113,0.4);
            }

        /* Turnering-kort */
        #tournament-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .tournament-card {
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 1.4rem 1.3rem 1.1rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            opacity: 0;
            transform: translateY(10px);
        }

            .tournament-card.card-show {
                animation: panelFadeIn 0.4s ease forwards;
            }

            .tournament-card:hover {
                transform: translateY(-4px);
                border-color: rgba(255,221,0,0.9);
                box-shadow: 0 0 12px rgba(255,221,0,0.7),
            }

            .tournament-card h3 {
                font-size: 0.95rem;
                margin-bottom: 0.3rem;
            }

            .tournament-card p {
                font-size: 0.8rem;
                color: var(--muted);
                margin-bottom: 0.1rem;
            }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.7rem;
        }

        .games-section {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px dashed rgba(148,163,184,0.55);
        }

            /* Matcher-rubrik + titlar i neon/rainbow */
            .games-section strong {
                font-size: 0.78rem;
                text-transform: uppercase;
                letter-spacing: 0.09em;
            }

                .games-section strong.rainbow-text {
                }

        .game-item strong {
            color: var(--neon1);
        }

        /* Match-rader */
        .game-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 0.45rem 0.8rem;
            margin-top: 0.45rem;
            font-size: 0.82rem;
            backdrop-filter: blur(6px);
            transition: border-color 0.16s, box-shadow 0.16s, transform 0.12s, background 0.16s;
        }

            .game-item:hover {
                border-color: rgba(255,221,0,0.85);
                box-shadow: 0 0 10px rgba(255,221,0,0.65);
                background: rgba(0,0,0,0.35);
                transform: translateY(-1px);
            }

        /* Sökfält */
        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

            .search-bar input {
                flex: 1;
            }

        .empty {
            color: var(--muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 1.5rem 0;
        }

        /* Modal-overlay + modal i samma stil som paneler */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
        }

            .modal-overlay.open {
                display: flex;
            }

        .modal {
            background: rgba(0,0,0,0.2);
            border-radius: 18px;
            padding: 2rem 1.75rem 1.6rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 16px 40px rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 480px;
            transition: transform 0.18s ease-out, box-shadow 0.18s ease-out, border-color 0.18s ease-out;
            opacity: 0;
            transform: translateY(18px);
        }

            .modal.show-panel {
                animation: panelFadeIn 0.8s ease forwards;
            }

            .modal:hover {
                border-color: rgba(255,221,0,0.9);
                box-shadow: 0 0 14px rgba(255,221,0,0.7),
            }

            .modal h2 {
                font-size: 1rem;
                margin-bottom: 1.25rem;
                text-transform: uppercase;
                letter-spacing: 0.18em;
            }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        /* Fade-in animation */
        @keyframes panelFadeIn {
            0% {
                opacity: 0;
                transform: translateY(18px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel {
            opacity: 0;
            transform: translateY(18px);
        }

            .panel.show-panel {
                animation: panelFadeIn 0.8s ease forwards;
            }
    </style>
</head>

<body>
    <!-- Canvas med neonbakgrund -->
    <canvas id="bgCanvas"></canvas>

    <!-- Topprad med titel och ikon -->
    <header>
        <span>🏆</span>
        <h1 class="rainbow-text">Game Tournament Manager</h1>
    </header>

    <!-- Huvudcontainer: vänster = skapa turnering, höger = skapa match, nederst = lista -->
    <div class="container">

        <!-- FORMULÄR: Skapa ny turnering -->
        <div class="panel">
            <h2 class="rainbow-text">➕ Skapa Turnering</h2>
            <form id="create-tournament-form">
                <label>Titel</label>
                <input type="text" id="t-title" placeholder="t.ex. Summer Smash 2025" required />

                <label>Beskrivning</label>
                <textarea id="t-desc" rows="2" placeholder="Valfri beskrivning..."></textarea>

                <label>Startdatum</label>
                <input type="datetime-local" id="t-date" required />

                <label>Max spelare (2–100)</label>
                <input type="number" id="t-players" min="2" max="100" value="8" required />

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary">Skapa turnering</button>
                </div>
                <div id="create-t-feedback" class="feedback"></div>
            </form>
        </div>

        <!-- FORMULÄR: Skapa ny match till vald turnering -->
        <div class="panel">
            <h2 class="rainbow-text">🎮 Lägg till Match</h2>
            <form id="create-game-form">
                <label>Matchtitel</label>
                <input type="text" id="g-title" placeholder="t.ex. Kvartsfinalen" required />

                <label>Tid</label>
                <input type="datetime-local" id="g-time" required />

                <label>Tillhör turnering</label>
                <select id="g-tournament">
                    <option value="">– Laddar turneringar –</option>
                </select>

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary">Lägg till match</button>
                </div>
                <div id="create-g-feedback" class="feedback"></div>
            </form>
        </div>

        <!-- LISTA: Visar alla turneringar + matcher -->
        <div class="panel full-width">
            <h2 class="rainbow-text">📋 Turneringar</h2>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Sök turnering..." />
                <button class="btn btn-primary" onclick="loadTournaments()">Sök</button>
            </div>
            <ul id="tournament-list">
                <li class="empty">Laddar...</li>
            </ul>
        </div>

    </div>

    <!-- MODAL: Redigera befintlig turnering -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <h2 class="rainbow-text">✏️ Redigera Turnering</h2>
            <input type="hidden" id="edit-id" />

            <label>Titel</label>
            <input type="text" id="edit-title" />

            <label>Beskrivning</label>
            <textarea id="edit-desc" rows="2"></textarea>

            <label>Startdatum</label>
            <input type="datetime-local" id="edit-date" />

            <label>Max spelare</label>
            <input type="number" id="edit-players" min="2" max="100" />

            <div class="modal-actions">
                <button class="btn btn-primary" onclick="submitEdit()">Spara</button>
                <button class="btn btn-secondary" onclick="closeModal()">Avbryt</button>
            </div>
            <div id="edit-feedback" class="feedback"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5116/api';

        function showFeedback(id, msg, isError) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'feedback show ' + (isError ? 'err' : 'ok');
            setTimeout(() => el.className = 'feedback', 3500);
        }

        function toLocalDatetimeValue(isoString) {
            return new Date(isoString).toISOString().slice(0, 16);
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function escJs(str) {
            return String(str)
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'");
        }

        function formatErrors(err) {
            if (err?.errors) return Object.values(err.errors).flat().join(' ');
            if (err?.title) return err.title;
            return '';
        }

        async function loadTournaments() {
            const search = document.getElementById('search-input').value.trim();
            const url = search
                ? `${API}/Tournaments?search=${encodeURIComponent(search)}`
                : `${API}/Tournaments`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Kunde inte hämta turneringar');
                const data = await res.json();
                renderTournaments(data);
                populateTournamentSelect(data);
            } catch (e) {
                document.getElementById('tournament-list').innerHTML =
                    `<li class="empty">❌ ${e.message}</li>`;
            }
        }

        function renderTournaments(tournaments) {
            const list = document.getElementById('tournament-list');
            if (!tournaments.length) {
                list.innerHTML = '<li class="empty">Inga turneringar hittades.</li>';
                return;
            }
            list.innerHTML = '';
            tournaments.forEach((t, index) => {
                const li = document.createElement('li');
                li.className = 'tournament-card';

                const gamesHtml = t.games?.length
                    ? t.games.map(g => `
                    <div class="game-item">
                      <div>
                        <strong class="rainbow-text">${escHtml(g.title)}</strong>
                        <span> &nbsp;${new Date(g.time).toLocaleString('sv-SE')}</span>
                      </div>
                      <button class="btn btn-danger" onclick="deleteGame(${g.id})">Ta bort</button>
                    </div>`).join('')
                    : '<p style="font-size:0.8rem;color:var(--muted);margin-top:0.4rem">Inga matcher.</p>';

                li.innerHTML = `
                    <h3 class="rainbow-text">${escHtml(t.title)}</h3>
                    <p>${escHtml(t.description)}</p>
                    <p>📅 ${new Date(t.startDate).toLocaleString('sv-SE')} &nbsp;|&nbsp; 👥 Max ${t.maxPlayers} spelare</p>
                    <div class="card-actions">
                      <button class="btn btn-warning"
                        onclick="openEdit(${t.id},'${escJs(t.title)}','${escJs(t.description)}','${t.startDate}',${t.maxPlayers})">
                        Redigera
                      </button>
                      <button class="btn btn-danger" onclick="deleteTournament(${t.id})">Ta bort</button>
                    </div>
                   <div class="games-section">
                      <strong class="rainbow-text">Matcher:</strong>
                      ${gamesHtml}
                   </div>`;
                list.appendChild(li);

                setTimeout(() => {
                    li.classList.add('card-show');
                }, 80 * index);
            });
        }

        function populateTournamentSelect(tournaments) {
            const sel = document.getElementById('g-tournament');
            sel.innerHTML = tournaments.length
                ? tournaments.map(t => `<option value="${t.id}">${escHtml(t.title)}</option>`).join('')
                : '<option value="">– Inga turneringar –</option>';
        }

        document.getElementById('create-tournament-form')
            .addEventListener('submit', async e => {
                e.preventDefault();
                const body = {
                    title: document.getElementById('t-title').value.trim(),
                    description: document.getElementById('t-desc').value.trim(),
                    startDate: document.getElementById('t-date').value,
                    maxPlayers: parseInt(document.getElementById('t-players').value)
                };
                try {
                    const res = await fetch(`${API}/Tournaments`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(formatErrors(err) || `HTTP ${res.status}`);
                    }
                    showFeedback('create-t-feedback', '✅ Turneringen skapades!', false);
                    e.target.reset();
                    loadTournaments();
                } catch (err) {
                    showFeedback('create-t-feedback', '❌ ' + err.message, true);
                }
            });

        async function deleteTournament(id) {
            if (!confirm('Ta bort turneringen?')) return;
            try {
                const res = await fetch(`${API}/Tournaments/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                loadTournaments();
            } catch (e) {
                alert('❌ Kunde inte ta bort: ' + e.message);
            }
        }

        function openEdit(id, title, desc, startDate, maxPlayers) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-title').value = title;
            document.getElementById('edit-desc').value = desc;
            document.getElementById('edit-date').value = toLocalDatetimeValue(startDate);
            document.getElementById('edit-players').value = maxPlayers;
            document.getElementById('edit-modal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('open');
        }

        async function submitEdit() {
            const id = document.getElementById('edit-id').value;
            const body = {
                title: document.getElementById('edit-title').value.trim(),
                description: document.getElementById('edit-desc').value.trim(),
                startDate: document.getElementById('edit-date').value,
                maxPlayers: parseInt(document.getElementById('edit-players').value)
            };
            try {
                const res = await fetch(`${API}/Tournaments/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(formatErrors(err) || `HTTP ${res.status}`);
                }
                showFeedback('edit-feedback', '✅ Sparat!', false);
                setTimeout(() => { closeModal(); loadTournaments(); }, 800);
            } catch (err) {
                showFeedback('edit-feedback', '❌ ' + err.message, true);
            }
        }

        document.getElementById('create-game-form')
            .addEventListener('submit', async e => {
                e.preventDefault();
                const tid = document.getElementById('g-tournament').value;
                if (!tid) {
                    showFeedback('create-g-feedback', '❌ Välj en turnering först.', true);
                    return;
                }
                const body = {
                    title: document.getElementById('g-title').value.trim(),
                    time: document.getElementById('g-time').value,
                    tournamentId: parseInt(tid)
                };
                try {
                    const res = await fetch(`${API}/Games`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(formatErrors(err) || `HTTP ${res.status}`);
                    }
                    showFeedback('create-g-feedback', '✅ Matchen lades till!', false);
                    e.target.reset();
                    loadTournaments();
                } catch (err) {
                    showFeedback('create-g-feedback', '❌ ' + err.message, true);
                }
            });

        async function deleteGame(id) {
            if (!confirm('Ta bort matchen?')) return;
            try {
                const res = await fetch(`${API}/Games/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                loadTournaments();
            } catch (e) {
                alert('❌ Kunde inte ta bort match: ' + e.message);
            }
        }

        // Canvas-bakgrund
        const canvas = document.getElementById("bgCanvas");
        const ctx = canvas.getContext("2d");
        let w, h, particles;

        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    radius: Math.random() * 2 + 1,
                    color: Math.random() > 0.5 ? "rgba(0,240,255,0.8)" : "rgba(255,0,230,0.8)"
                });
            }
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, w, h);
            for (const p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
            }
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = "rgba(255,221,0," + (1 - dist / 120) + ")";
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawCanvas);
        }

        window.addEventListener("resize", initCanvas);

        function initPanelFadeIn() {
            const panels = document.querySelectorAll('.panel, .modal');
            panels.forEach((p, index) => {
                setTimeout(() => {
                    p.classList.add('show-panel');
                }, 150 + index * 130);
            });
        }

        // Init
        initCanvas();
        drawCanvas();
        initPanelFadeIn();
        loadTournaments();
    </script>
</body>
</html>
